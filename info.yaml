# Tiny Tapeout project information
project:
  title:        "SR-Nibbler"      # Project title
  author:       "Stanley Booth"      # Your name
  discord:      "srb2149"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A basic register based 4-bit CPU"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     1000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_sr_nibbler_srb2149"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "tt-nibbler-interface.sv"
    - "sr-nibbler.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Serial Instruction bit 0"
  ui[1]: "Serial Instruction bit 1"
  ui[2]: "Serial Instruction bit 2"
  ui[3]: "Serial Instruction bit 3"
  ui[4]: "Serial Instruction bit 4"
  ui[5]: "Memory mapped input nibble (DMEM 7) bit 0"
  ui[6]: "Memory mapped input nibble (DMEM 7) bit 1"
  ui[7]: "Memory mapped input nibble (DMEM 7) bit 2"

  # Outputs
  uo[0]: "Memory mapped output nibble (DMEM 4) bit 0"
  uo[1]: "Memory mapped output nibble (DMEM 4) bit 1"
  uo[2]: "Memory mapped output nibble (DMEM 4) bit 2"
  uo[3]: "Memory mapped output nibble (DMEM 4) bit 3"
  uo[4]: "Memory mapped output nibble (DMEM 3) bit 0"
  uo[5]: "Memory mapped output nibble (DMEM 3) bit 1"
  uo[6]: "Memory mapped output nibble (DMEM 3) bit 2"
  uo[7]: "Memory mapped output nibble (DMEM 3) bit 3"

  # Bidirectional pins
  uio[0]: "IN  - Memory mapped input nibble (DMEM 7) bit 3"
  uio[1]: "OUT - Serial Line Address bit 0"
  uio[2]: "OUT - Serial Line Address bit 1"
  uio[3]: "OUT - Serial Line Address bit 2"
  uio[4]: "OUT - Memory mapped output nibble (DMEM 5) bit 0"
  uio[5]: "OUT - Memory mapped output nibble (DMEM 5) bit 1"
  uio[6]: "OUT - Memory mapped output nibble (DMEM 5) bit 2"
  uio[7]: "OUT - Memory mapped output nibble (DMEM 5) bit 3"

# Do not change!
yaml_version: 6
